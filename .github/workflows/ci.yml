name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run version:check
      - run: npm run build
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm pack -w bahama --dry-run
      - run: npm pack -w bahama-runtime --dry-run
